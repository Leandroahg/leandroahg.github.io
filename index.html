<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.pyi.com/sdk.js"></script>
</head>
<body>
    <h1>Bem-vindo ao Pi Quest Evolution</h1>
    <p>Clique no botão abaixo para testar a transação:</p>
    
    <button id="btn-pagar">Processar Pagamento de Teste</button>

    <script>
        // Inicializa o SDK
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagar').addEventListener('click', async () => {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.01, // Valor de teste
                    memo: "Teste de transação do app",
                    metadata: { test: "teste_inicial" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("Pagamento pronto para aprovação:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        console.log("Pagamento completo:", txid);
                        alert("Transação realizada com sucesso! ID: " + txid);
                    },
                    onCancel: (paymentId) => {
                        alert("Pagamento cancelado.");
                    },
                    onError: (error, payment) => {
                        console.error("Erro no pagamento:", error);
                    }
                });
            } catch (err) {
                console.error("Erro ao criar pagamento:", err);
            }
        });
    </script>
</body>
</html>
