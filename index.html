<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <button id="btn-pagar">Pagar 0.1 Pi</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagar').addEventListener('click', async () => {
            try {
                // 1. Autenticação
                await Pi.authenticate(['payments'], () => {});
                
                // 2. Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste de integração",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerCreate: (paymentId) => {
                        console.log("Pagamento criado:", paymentId);
                    },
                    onReadyForServerApproval: (paymentId) => {
                        // O comando abaixo é OBRIGATÓRIO para abrir a carteira
                        Pi.approvePayment(paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Sucesso! TXID: " + txid);
                    },
                    onCancel: (paymentId) => {
                        alert("Cancelado.");
                    },
                    onError: (error, paymentId) => {
                        alert("Erro: " + error.message);
                    }
                });
            } catch (err) {
                alert("Erro ao processar: " + err.message);
            }
        });
    </script>
</body>
</html>
