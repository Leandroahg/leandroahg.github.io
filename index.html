<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

    <button id="btn-pagar" style="padding: 20px; font-size: 18px;">Pagar 0.1 Pi</button>

    <script>
        // O Pi SDK exige sandbox: false para transações reais de validação (etapa 10)
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        document.getElementById('btn-pagar').addEventListener('click', async () => {
            try {
                // Autenticação
                await Pi.authenticate(['payments'], (authErr) => {
                    if (authErr) throw authErr;
                });

                // Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste de conclusão da tarefa 10",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerCreate: (paymentId) => {
                        console.log("Pagamento criado:", paymentId);
                    },
                    onReadyForServerApproval: (paymentId) => {
                        // Comando que força a abertura da carteira
                        Pi.approvePayment(paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Sucesso! Transação completa: " + txid);
                    },
                    onCancel: (paymentId) => {
                        alert("Cancelado pelo usuário.");
                    },
                    onError: (error, paymentId) => {
                        alert("Erro no pagamento: " + error.message);
                    }
                });
            } catch (err) {
                alert("Erro ao processar: " + err.message);
            }
        });
    </script>
</body>
</html>
