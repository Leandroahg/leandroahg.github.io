<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Autenticação com as funções obrigatórias vazias para evitar o erro
                await Pi.authenticate(["payments"], {
                    onIncompletePaymentFound: function(payment) {},
                    onReadyForServerCreate: function(payment) {}
                });

                // Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: function(paymentId) { alert("Preparado! ID: " + paymentId); },
                    onCancel: function(paymentId) { alert("Cancelado"); },
                    onError: function(error, paymentId) { alert("Erro: " + error.message); },
                    onAlgorithmDecisionMade: function(paymentId) { alert("Decisão tomada"); }
                });
            } catch (err) {
                alert("Erro: " + err.message);
            }
        });
    </script>
</body>
</html>
