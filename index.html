<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution - Teste</h1>
    <button id="btn-teste">Testar Conexão com Pi</button>

    <script>
        document.getElementById('btn-teste').addEventListener('click', () => {
            if (window.Pi) {
                alert("SDK da Pi carregado com sucesso!");
            } else {
                alert("Erro: SDK da Pi não foi encontrado.");
            }
        });
    </script>
</body>
</html>
