<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        // Inicializa o SDK no modo Sandbox (teste)
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Solicita a criação do pagamento
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste de pagamento",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (id) => alert("Sucesso! ID: " + id),
                    onCancel: () => alert("Pagamento cancelado pelo usuário."),
                    onError: (err) => alert("Erro no pagamento: " + err.message),
                });
            } catch (err) {
                alert("Erro ao iniciar: " + err);
            }
        });
    </script>
</body>
</html>
