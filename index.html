<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <!-- Carrega o SDK da Pi -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        // Inicializa o SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // A lógica do botão
        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Autenticação
                await Pi.authenticate(['payments'], {
                    onIncompletePaymentFound: (payment) => { console.log(payment); },
                    onReadyForServerCreate: (payment) => { console.log(payment); }
                });

                // Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste final",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (paymentId) => { alert("ID Gerado: " + paymentId); },
                    onReadyForServerApproval: (paymentId) => { alert("Pronto para aprovação: " + paymentId); },
                    onReadyForServerCompletion: (paymentId, txid) => { alert("Pagamento concluído! TXID: " + txid); },
                    onCancel: (paymentId) => { alert("Pagamento cancelado"); },
                    onError: (error, paymentId) => { alert("Erro: " + error.message); }
                });
            } catch (err) {
                alert("Erro: " + err.message);
            }
        });
    </script>
</body>
</html>
