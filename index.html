<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        // Aguarda a janela carregar para garantir que o SDK está pronto
        window.addEventListener('load', () => {
            const Pi = window.Pi;
            Pi.init({ version: "2.0", sandbox: true });
            console.log("SDK Inicializado");
        });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Autenticação explícita antes de qualquer coisa
                await Pi.authenticate(['payments'], {
                    onIncompletePaymentFound: (payment) => { console.log(payment); }
                });

                // Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste final",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (paymentId) => { alert("ID criado: " + paymentId); },
                    onReadyForServerApproval: (paymentId) => { console.log("Aprovando: " + paymentId); },
                    onReadyForServerCompletion: (paymentId, txid) => { alert("Sucesso! TXID: " + txid); },
                    onCancel: (paymentId) => { alert("Cancelado"); },
                    onError: (error, paymentId) => { alert("Erro: " + error.message); }
                });
            } catch (err) {
                alert("Erro ao conectar: " + err.message);
            }
        });
    </script>
</body>
</html>
