<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', () => {
            Pi.createPayment({
                amount: 0.1,
                memo: "Teste",
                metadata: {}
            }, {
                onReadyForServerCreate: (paymentId) => {
                    console.log("ID criado:", paymentId);
                },
                onReadyForServerApproval: (paymentId) => {
                    console.log("Aprovação solicitada:", paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("Sucesso! TXID: " + txid);
                },
                onCancel: (paymentId) => {
                    alert("Cancelado");
                },
                onError: (error, paymentId) => {
                    alert("Erro: " + error.message);
                }
            });
        });
    </script>
</body>
</html>
