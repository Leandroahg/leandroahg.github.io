<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    document.getElementById('btn-pagar').addEventListener('click', async () => {
        try {
            console.log("Iniciando autenticação...");
            await Pi.authenticate(['payments'], (authErr) => {
                if (authErr) throw authErr;
            });

            console.log("Criando pagamento...");
            await Pi.createPayment({
                amount: 0.1,
                memo: "Teste de integração",
                metadata: { type: "test" }
            }, {
                onReadyForServerCreate: (paymentId) => {
                    console.log("Pagamento criado com ID:", paymentId);
                    Pi.approvePayment(paymentId); // Forçando a aprovação aqui
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("Sucesso! TXID: " + txid);
                },
                onCancel: (paymentId) => {
                    alert("Cancelado.");
                },
                onError: (error, paymentId) => {
                    alert("Erro no pagamento: " + error.message);
                }
            });
        } catch (err) {
            alert("Erro crítico: " + err.message);
        }
    });
</script>
