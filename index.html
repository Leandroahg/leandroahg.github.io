<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // 1. Tenta autenticar primeiro
                const user = await Pi.authenticate(['payments'], {
                    onIncompletePaymentFound: (payment) => { console.log(payment); }
                });

                // 2. Se autenticou, tenta criar o pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste final",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (paymentId) => { 
                        console.log("ID criado: " + paymentId); 
                    },
                    onReadyForServerApproval: (paymentId) => { 
                        alert("Aprovando pagamento: " + paymentId); 
                    },
                    onReadyForServerCompletion: (paymentId, txid) => { 
                        alert("Sucesso! ID: " + txid); 
                    },
                    onCancel: (paymentId) => { alert("Cancelado"); },
                    onError: (error, paymentId) => { alert("Erro: " + error.message); }
                });
            } catch (err) {
                alert("Erro ao processar: " + err.message);
            }
        });
    </script>
</body>
</html>
