<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Autenticação
                await Pi.authenticate(['payments'], {
                    onIncompletePaymentFound: (payment) => { console.log(payment); }
                });

                // Criação do pagamento
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste final",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (paymentId) => { 
                        alert("Pagamento iniciado! Aguarde a tela de aprovação."); 
                    },
                    onReadyForServerApproval: (paymentId) => { 
                        console.log("Aprovação solicitada: " + paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => { 
                        alert("Sucesso! Transação concluída: " + txid); 
                    },
                    onCancel: (paymentId) => { alert("Pagamento cancelado."); },
                    onError: (error, paymentId) => { 
                        alert("Erro: " + error.message); 
                    }
                });
            } catch (err) {
                alert("Erro ao processar: " + err.message);
            }
        });
    </script>
</body>
</html>
