<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Solicita autenticação com o escopo de pagamentos
                await Pi.authenticate(["payments"], {
                    onIncompletePaymentFound: (payment) => { console.log(payment); },
                    onReadyForServerCreate: (payment) => { console.log(payment); }
                });

                // Cria o pagamento conforme exigido pelo SDK
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste final",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (paymentId) => { alert("ID Gerado: " + paymentId); },
                    onCancel: (paymentId) => { alert("Cancelado"); },
                    onError: (error, paymentId) => { alert("Erro: " + error.message); },
                    onAlgorithmDecisionMade: (paymentId) => { alert("Decisão do algoritmo feita"); }
                });
            } catch (err) {
                alert("Erro: " + err.message);
            }
        });
    </script>
</body>
</html>
