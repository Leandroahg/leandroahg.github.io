<!DOCTYPE html>
<html>
<head>
    <title>Pi Quest Evolution</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>Pi Quest Evolution</h1>
    <button id="btn-pagamento">Processar Pagamento de Teste</button>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('btn-pagamento').addEventListener('click', async () => {
            try {
                // Autentica solicitando explicitamente o escopo de pagamentos
                const auth = await Pi.authenticate(["payments"], {});
                
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Teste",
                    metadata: { type: "test" },
                }, {
                    onReadyForServerCreate: (id) => alert("Sucesso! ID: " + id),
                    onCancel: () => alert("Cancelado"),
                    onError: (err) => alert("Erro: " + err.message),
                });
            } catch (err) {
                alert("Erro: " + err.message);
            }
        });
    </script>
</body>
</html>
